<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Test</title>
<style>
body{background:#111;color:#eee;font-family:monospace;padding:20px;font-size:14px;}
button{width:100%;padding:16px;background:#e8d5a3;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;margin-bottom:16px;cursor:pointer;}
#out{background:#1a1a1a;padding:16px;border-radius:8px;white-space:pre-wrap;word-break:break-all;min-height:100px;line-height:1.6;}
input{width:100%;padding:12px;background:#222;color:#eee;border:1px solid #444;border-radius:8px;font-size:14px;font-family:monospace;box-sizing:border-box;margin-bottom:10px;}
</style>
</head>
<body>
<h3 style="color:#e8d5a3;margin:0 0 16px">Claude API Test</h3>
<input id="key" placeholder="Paste API key here (sk-ant-...)" type="password"/>
<button onclick="runTest()">Test API Call</button>
<div id="out">Tap the button to test...</div>
<script>
function log(msg){
  document.getElementById('out').textContent+='\n'+msg;
}
async function runTest(){
  var out=document.getElementById('out');
  out.textContent='';
  var key=document.getElementById('key').value.trim()||localStorage.getItem('claude_api_key')||'';
  if(!key){out.textContent='ERROR: Paste your API key first';return;}
  localStorage.setItem('claude_api_key',key);
  log('Starting...');
  log('Time: '+new Date().toISOString());
  var controller=new AbortController();
  var t=0;
  var tick=setInterval(function(){t++;log('tick '+t+'s');},1000);
  var timer=setTimeout(function(){log('ABORTING after 15s');controller.abort();},15000);
  try{
    log('Fetching api.anthropic.com...');
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:50,
        messages:[{role:'user',content:'Say HELLO only.'}]
      })
    });
    clearTimeout(timer);clearInterval(tick);
    log('HTTP '+r.status);
    var text=await r.text();
    log('Response: '+text.slice(0,300));
  }catch(e){
    clearTimeout(timer);clearInterval(tick);
    log('ERROR: '+e.name+' — '+e.message);
  }
}
</script>
</body>
</html>
