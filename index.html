<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Quick Price Check</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--surface:#161616;--surface2:#1e1e1e;--border:#272727;--border2:#333;
  --text:#f5f0e8;--text2:#7a7570;--text3:#3f3c38;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);--green-border:rgba(34,197,94,0.25);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,0.1);--yellow-border:rgba(234,179,8,0.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.25);
  --accent:#f0a500;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

/* Header */
.header{
  padding:52px 20px 16px;
  display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header-left h1{
  font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.04em;
  color:var(--text);line-height:1;
}
.header-left p{font-size:12px;color:var(--text2);margin-top:3px;}
.key-btn{
  background:none;border:1px solid var(--border2);border-radius:8px;
  padding:7px 12px;font-size:11px;color:var(--text2);cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
.key-btn.set{color:var(--accent);border-color:rgba(240,165,0,0.3);}

/* Entry area */
.entry-area{padding:20px;}
.barcode-wrap{position:relative;margin-bottom:12px;}
.barcode-input{
  width:100%;padding:18px 52px 18px 18px;
  font-family:'DM Mono',monospace;font-size:20px;font-weight:500;
  letter-spacing:0.06em;text-align:center;
  background:var(--surface);border:2px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);
  -webkit-appearance:none;transition:border-color 0.2s;
}
.barcode-input:focus{outline:none;border-color:var(--accent);}
.barcode-input::placeholder{color:var(--text3);font-size:14px;letter-spacing:0;}
.clear-x{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;background:var(--border2);
  border:none;color:var(--text2);font-size:13px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
}
.clear-x.show{display:flex;}

.btn-row{display:grid;grid-template-columns:1fr 2fr;gap:10px;}
.btn{
  padding:15px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;
  cursor:pointer;border:none;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:opacity 0.15s,transform 0.1s;
}
.btn:active{opacity:0.8;transform:scale(0.97);}
.btn-paste{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-check{background:var(--accent);color:#000;}

/* Result card */
.result-area{padding:0 20px 20px;}

.verdict-card{
  border-radius:var(--radius);overflow:hidden;margin-bottom:12px;
  border:2px solid var(--border);
  animation:slideUp 0.3s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.verdict-header{
  padding:20px 20px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
.verdict-title{font-size:18px;font-weight:600;color:var(--text);line-height:1.3;flex:1;}
.verdict-platform{
  font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;
  background:var(--surface2);color:var(--text2);white-space:nowrap;flex-shrink:0;
  text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;
}

.verdict-body{padding:0 20px 20px;display:flex;flex-direction:column;gap:10px;}

/* The big verdict */
.verdict-pill{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-radius:var(--radius-sm);
}
.verdict-pill.list{background:var(--green-bg);border:1px solid var(--green-border);}
.verdict-pill.maybe{background:var(--yellow-bg);border:1px solid var(--yellow-border);}
.verdict-pill.skip{background:var(--red-bg);border:1px solid var(--red-border);}
.verdict-label{font-size:13px;font-weight:600;}
.verdict-pill.list .verdict-label{color:var(--green);}
.verdict-pill.maybe .verdict-label{color:var(--yellow);}
.verdict-pill.skip .verdict-label{color:var(--red);}
.verdict-price{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.04em;}
.verdict-pill.list .verdict-price{color:var(--green);}
.verdict-pill.maybe .verdict-price{color:var(--yellow);}
.verdict-pill.skip .verdict-price{color:var(--red);}

/* Price breakdown */
.price-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.price-cell{
  background:var(--surface2);border-radius:var(--radius-sm);
  padding:12px;text-align:center;
}
.price-cell-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.price-cell-value{font-size:16px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;}

/* Reasoning */
.reasoning{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px;
  font-size:13px;color:var(--text2);line-height:1.6;
}

/* Next btn */
.next-btn{
  width:100%;padding:15px;border-radius:var(--radius-sm);
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);font-size:15px;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.next-btn:active{opacity:0.7;}

/* Loading */
.loading-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:36px 20px;text-align:center;
  margin-bottom:12px;
}
.spinner{
  width:32px;height:32px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.7s linear infinite;margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:var(--text);font-weight:500;}
.loading-sub{font-size:12px;color:var(--text2);margin-top:6px;}

/* History */
.history-section{padding:0 20px 40px;}
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;}
.section-clear{font-size:11px;color:var(--text3);cursor:pointer;}

.history-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:8px;cursor:pointer;
}
.history-item:active{border-color:var(--border2);}
.history-icon{font-size:18px;flex-shrink:0;}
.history-info{flex:1;min-width:0;}
.history-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-meta{font-size:11px;color:var(--text2);margin-top:1px;font-family:'DM Mono',monospace;}
.history-verdict{font-size:12px;font-weight:600;flex-shrink:0;}
.history-verdict.list{color:var(--green);}
.history-verdict.maybe{color:var(--yellow);}
.history-verdict.skip{color:var(--red);}

/* Key modal */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);
  z-index:200;padding:40px 20px;
}
.modal-bg.show{display:flex;align-items:center;justify-content:center;}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);padding:24px;width:100%;max-width:400px;
}
.modal h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.modal-input{
  width:100%;padding:13px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-family:'DM Mono',monospace;font-size:13px;
  -webkit-appearance:none;margin-bottom:12px;
}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-cancel{padding:12px;background:none;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.modal-save{padding:12px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#000;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}

.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:11px 20px;
  border-radius:100px;font-size:13px;font-weight:500;
  opacity:0;transition:all 0.25s;z-index:999;
  white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Price Check</h1>
    <p>Games · Figures · Collectibles</p>
  </div>
  <button class="key-btn" id="keyBtn" onclick="showKeyModal()">⚙ API Key</button>
</div>

<div class="entry-area">
  <div class="barcode-wrap">
    <input class="barcode-input" id="barcodeInput" type="text" inputmode="numeric"
      placeholder="Enter barcode…" autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="onInput()"/>
    <button class="clear-x" id="clearX" onclick="clearInput()">✕</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-paste" onclick="doPaste()">📋 Paste</button>
    <button class="btn btn-check" onclick="doCheck()">Check Value →</button>
  </div>
</div>

<div class="result-area" id="resultArea"></div>

<div class="history-section" id="historySection" style="display:none">
  <div class="section-hdr">
    <span class="section-title">Recent checks</span>
    <span class="section-clear" onclick="clearHistory()">Clear all</span>
  </div>
  <div id="historyList"></div>
</div>

<!-- Key modal -->
<div class="modal-bg" id="keyModal">
  <div class="modal">
    <h3>Anthropic API Key</h3>
    <p>Saved on this device only. Get yours at console.anthropic.com</p>
    <input class="modal-input" id="keyInput" type="password" placeholder="sk-ant-…"/>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="hideKeyModal()">Cancel</button>
      <button class="modal-save" onclick="saveKey()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'claude_api_key';
const HISTORY_KEY = 'price_check_history';

let checkHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

// ── Key management ────────────────────────────────────────────────────────────
function getKey(){ return localStorage.getItem(STORAGE_KEY) || ''; }
function updateKeyBtn(){
  const btn = document.getElementById('keyBtn');
  btn.classList.toggle('set', !!getKey());
  btn.textContent = getKey() ? '🔑 Key set' : '⚙ API Key';
}
function showKeyModal(){
  document.getElementById('keyInput').value = getKey();
  document.getElementById('keyModal').classList.add('show');
}
function hideKeyModal(){ document.getElementById('keyModal').classList.remove('show'); }
function saveKey(){
  const k = document.getElementById('keyInput').value.trim();
  if(k){ localStorage.setItem(STORAGE_KEY, k); showToast('Key saved!'); }
  else { localStorage.removeItem(STORAGE_KEY); showToast('Key cleared'); }
  hideKeyModal(); updateKeyBtn();
}

// ── Input ─────────────────────────────────────────────────────────────────────
function onInput(){
  document.getElementById('clearX').classList.toggle('show', document.getElementById('barcodeInput').value.length > 0);
}
function clearInput(){
  document.getElementById('barcodeInput').value = '';
  document.getElementById('clearX').classList.remove('show');
  document.getElementById('barcodeInput').focus();
}
async function doPaste(){
  try{
    const text = await navigator.clipboard.readText();
    const cleaned = text.replace(/\s/g,'').trim();
    if(cleaned.length >= 6){
      document.getElementById('barcodeInput').value = cleaned;
      onInput();
      showToast('Pasted!');
      if(cleaned.length >= 8) setTimeout(doCheck, 300);
    } else { showToast('Nothing on clipboard'); }
  } catch(e){
    document.getElementById('barcodeInput').focus();
    showToast('Tap and hold field → Paste');
  }
}
document.getElementById('barcodeInput').addEventListener('keydown', e => { if(e.key==='Enter') doCheck(); });

// ── Main check ────────────────────────────────────────────────────────────────
function doCheck(){
  const barcode = document.getElementById('barcodeInput').value.trim();
  if(!barcode){ showToast('Enter a barcode first'); return; }
  if(!getKey()){ showKeyModal(); return; }
  runCheck(barcode);
}

async function runCheck(barcode){
  const resultArea = document.getElementById('resultArea');
  resultArea.innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-text">Checking value…</div>
      <div class="loading-sub" id="loadSub">Looking up ${barcode}</div>
    </div>`;
  document.getElementById('historySection').style.display = 'none';

  const apiPrompt = `You are a resale price expert specialising in video games and action figures. 
Look up the product with barcode/UPC "${barcode}".

Return ONLY valid JSON, no markdown, no explanation:
{
  "found": true,
  "name": "Full product name",
  "platform": "e.g. PlayStation 4 or Marvel Legends or N/A",
  "type": "game or figure or other",
  "low": "lowest recent eBay sold price e.g. $8.00",
  "avg": "average recent eBay sold price e.g. $14.00", 
  "high": "highest recent eBay sold price e.g. $22.00",
  "verdict": "list or maybe or skip",
  "verdict_reason": "One sentence explaining why e.g. Consistently sells $12-18, good demand, easy to ship.",
  "condition_note": "One sentence tip about condition e.g. Disc-only copies sell for half. Complete with manual adds $3-5."
}

Verdict guide: list = avg over $10 and good demand. maybe = $5-10 or inconsistent sales. skip = under $5 or very slow sales.
If barcode not found, set found false, use best guess for name, and note uncertainty in verdict_reason.`;

  try{
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 25000);

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        messages: [{ role: 'user', content: apiPrompt }]
      })
    });

    clearTimeout(timer);

    if(!r.ok){
      const err = await r.text();
      throw new Error(`API ${r.status}: ${err.slice(0,100)}`);
    }

    const data = await r.json();
    const raw = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('Bad response: ' + raw.slice(0,80));
    const result = JSON.parse(match[0]);
    showResult(barcode, result);

  } catch(e){
    const msg = e.name === 'AbortError' ? 'Request timed out — check your connection' : e.message;
    resultArea.innerHTML = `
      <div class="verdict-card" style="border-color:var(--border);">
        <div class="verdict-body" style="padding:20px;">
          <div class="reasoning" style="color:var(--red);">⚠ ${msg}</div>
          <button class="next-btn" onclick="doCheck()" style="margin-top:10px;">Try again</button>
        </div>
      </div>`;
    renderHistory();
  }
}

function showResult(barcode, r){
  const icons = { game:'🎮', figure:'🦸', other:'📦' };
  const icon = icons[r.type] || '📦';
  const verdict = r.verdict || 'maybe';
  const verdictText = { list:'✓ List it', maybe:'Maybe list', skip:'Skip it' };

  const card = `
    <div class="verdict-card" style="border-color:${verdict==='list'?'var(--green-border)':verdict==='skip'?'var(--red-border)':'var(--yellow-border)'};">
      <div class="verdict-header">
        <div class="verdict-title">${r.name || 'Unknown item'}</div>
        ${r.platform && r.platform !== 'N/A' ? `<div class="verdict-platform">${r.platform}</div>` : ''}
      </div>
      <div class="verdict-body">
        <div class="verdict-pill ${verdict}">
          <div>
            <div class="verdict-label">${icon} ${verdictText[verdict]}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px;">avg selling price</div>
          </div>
          <div class="verdict-price">${r.avg || '?'}</div>
        </div>
        <div class="price-row">
          <div class="price-cell">
            <div class="price-cell-label">Low</div>
            <div class="price-cell-value">${r.low || '—'}</div>
          </div>
          <div class="price-cell">
            <div class="price-cell-label">Avg</div>
            <div class="price-cell-value">${r.avg || '—'}</div>
          </div>
          <div class="price-cell">
            <div class="price-cell-label">High</div>
            <div class="price-cell-value">${r.high || '—'}</div>
          </div>
        </div>
        <div class="reasoning">${r.verdict_reason || ''}</div>
        ${r.condition_note ? `<div class="reasoning" style="border-color:rgba(240,165,0,0.2);background:rgba(240,165,0,0.05);">💡 ${r.condition_note}</div>` : ''}
        <button class="next-btn" onclick="nextItem()">Check another item →</button>
      </div>
    </div>`;

  document.getElementById('resultArea').innerHTML = card;

  // Save to history
  const entry = { barcode, name: r.name, type: r.type, verdict, avg: r.avg, platform: r.platform, time: Date.now() };
  checkHistory = [entry, ...checkHistory.filter(h=>h.barcode!==barcode)].slice(0, 20);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(checkHistory));
  renderHistory();
}

function nextItem(){
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('barcodeInput').value = '';
  document.getElementById('clearX').classList.remove('show');
  document.getElementById('barcodeInput').focus();
  renderHistory();
}

// ── History ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if(!checkHistory.length){ section.style.display='none'; return; }
  section.style.display = 'block';
  const icons = { game:'🎮', figure:'🦸', other:'📦' };
  const verdictText = { list:'List it', maybe:'Maybe', skip:'Skip' };
  list.innerHTML = checkHistory.map((item,i) => `
    <div class="history-item" onclick="recheck(${i})">
      <div class="history-icon">${icons[item.type]||'📦'}</div>
      <div class="history-info">
        <div class="history-name">${item.name||'Unknown'}</div>
        <div class="history-meta">${item.barcode} · ${timeAgo(item.time)}</div>
      </div>
      <div class="history-verdict ${item.verdict}">${verdictText[item.verdict]||'?'} · ${item.avg||'?'}</div>
    </div>`).join('');
}

function recheck(i){
  const item = checkHistory[i];
  document.getElementById('barcodeInput').value = item.barcode;
  onInput();
  runCheck(item.barcode);
}

function clearHistory(){
  checkHistory = [];
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

function timeAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60) return 'just now';
  if(d<3600) return Math.floor(d/60)+'m ago';
  if(d<86400) return Math.floor(d/3600)+'h ago';
  return Math.floor(d/86400)+'d ago';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
updateKeyBtn();
renderHistory();
</script>
</body>
</html>
